<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador EAN GTIN</title>
    <link rel="stylesheet" href="styles/popup.css">
</head>

<body class="popup">
    <div class="card">
        <div class="header">
            <div>
                <!-- Ícone SVG moderno + título (melhoria visual premium) -->
                <div class="header-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="header-icon">
                        <rect x="3" y="5" width="2" height="14" rx="0.5"/>
                        <rect x="7" y="3" width="2" height="18" rx="0.5"/>
                        <rect x="11" y="8" width="2" height="8" rx="0.5"/>
                        <rect x="15" y="4" width="2" height="16" rx="0.5"/>
                        <rect x="19" y="6" width="2" height="12" rx="0.5"/>
                    </svg>
                    <div class="h1">Gerador EAN / GTIN</div>
                </div>

                <label class="label" for="gtinType">Tipo</label>
                <select id="gtinType" class="input">
                    <option value="13">GTIN-13 (EAN-13)</option>
                    <option value="14">GTIN-14</option>
                </select>

                <label class="label" for="prefixInput">Prefixo (opcional):</label>
                <input id="prefixInput" class="input" placeholder="Ex: 7891234" />

                <!-- Checkbox para ativar geração múltipla -->
                <label style="display:flex; align-items:center; gap:8px; margin-top:10px;">
                    <input id="multiCheck" type="checkbox"/>
                    <span>Gerar múltiplos códigos</span>
                </label>

                <button id="generateBtn" class="btn btn-primary" style="margin-top: 10px">Gerar</button>

                <!-- Container que aparece apenas quando o multicheck está marcado -->
                <div id="multiOptions" style="display:none; margin-top:8px;">
                    <label for="quantityInput">Quantidade</label>
                    <input id="quantityInput" type="number" min="1" max="100" value="10" />
                    <button id="downloadCsvBtn" class="btn" style="margin-top:8px; display:none;">Baixar Códigos EAN em CSV</button>
                    <button id="downloadBarcodeZipBtn" class="btn" style="margin-top:8px; display:none;">Baixar Códigos de Barras em ZIP</button>
                </div>

                <div id="results" class="results" aria-live="polite" style="margin-top: 10px;"></div>

                <button id="copyBtn" class="btn btn-ghost" disabled style="margin-top: 10px;">Copiar Código</button>
            </div>
        </div>
    </div>

    <!-- Scripts das bibliotecas externas -->
    <script src="scripts/jsbarcode.min.js"></script>
    <script src="scripts/jszip.min.js"></script>

    <script type="module" src="scripts/popup.js"></script>
</body>

</html>
